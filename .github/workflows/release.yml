name: Build Installers and Create Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            cmd: npm run build:installer
            glob: dist/*Setup*.exe
          - os: macos-latest
            name: macos
            cmd: npm run build:dmg
            glob: dist/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: ${{ matrix.cmd }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.name }}
          path: ${{ matrix.glob }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          gh release view "$tag" --repo "$repo" >/dev/null 2>&1 || gh release create "$tag" --repo "$repo" --title "$tag" --generate-notes
          gh release upload "$tag" artifacts/**/* --repo "$repo" --clobber
          gh release view "$tag" --repo "$repo"

