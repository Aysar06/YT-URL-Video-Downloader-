name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build installer (web installer)
        run: npm run build:installer

      - name: List build outputs
        run: powershell -NoProfile -Command "Get-ChildItem dist | Select-Object Name,Length | Format-Table -AutoSize"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Video-Downloader-Setup
          path: |
            dist/*Setup*.exe
          if-no-files-found: error

