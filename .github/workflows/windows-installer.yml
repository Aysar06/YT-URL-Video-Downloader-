name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build installer (web installer)
        run: npm run build:installer

      - name: List build outputs
        run: powershell -NoProfile -Command "Get-ChildItem dist/nsis-web | Select-Object Name,Length | Format-Table -AutoSize"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Video-Downloader-Setup
          path: |
            dist/nsis-web/*
          if-no-files-found: error

      - name: Create release and upload assets (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ github.ref_name }}"
          gh release view $tag --repo $repo 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $repo --title $tag --generate-notes
          }
          gh release upload $tag dist/nsis-web/* --repo $repo --clobber
          gh release view $tag --repo $repo
