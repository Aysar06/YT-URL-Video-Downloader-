name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build installer (web installer)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: npm run build:installer

      - name: Build + publish installer (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis-web --publish always

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Video-Downloader-Setup
          path: |
            dist/*Setup*.exe
            dist/*.yml
            dist/*.blockmap
            dist/*.7z
          if-no-files-found: error
